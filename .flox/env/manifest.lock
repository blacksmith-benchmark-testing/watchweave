{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.13.0",
    "install": {
      "nodejs_20": {
        "pkg-path": "nodejs_20"
      },
      "postgresql_15": {
        "pkg-path": "postgresql_15"
      },
      "python311": {
        "pkg-path": "python311"
      },
      "redis": {
        "pkg-path": "redis",
        "version": "7.2.7"
      }
    },
    "vars": {
      "DB_HOST": "localhost",
      "DB_NAME": "watchweave",
      "DB_PASSWORD": "watchweave123",
      "DB_PORT": "5432",
      "DB_USER": "postgres",
      "FLASK_DEBUG": "true",
      "JWT_SECRET": "dev-jwt-secret-change-in-production",
      "NODE_ENV": "development",
      "PGDATABASE": "watchweave",
      "PGDATA_DIR": "postgres_data",
      "PGPASS": "watchweave123",
      "PGUSER": "postgres",
      "PORT": "3000",
      "REACT_APP_API_URL": "http://localhost:3000",
      "REACT_APP_RECOMMENDATION_URL": "http://localhost:5000",
      "REDIS_HOST": "localhost",
      "REDIS_PORT": "6379"
    },
    "hook": {
      "on-activate": "  if [ ! -d \"$FLOX_ENV_CACHE/python-venv\" ]; then\n    python3 -m venv \"$FLOX_ENV_CACHE/python-venv\"\n  fi\n\n  export PGDATA=\"$FLOX_ENV_CACHE/$PGDATA_DIR\"\n  if [ ! -d \"$PGDATA\" ]; then\n    initdb \"$PGDATA\" --username \"$PGUSER\" -A md5 --pwfile=<(echo \"$PGPASS\") --auth=trust\n    echo \"completed initdb in $PGDATA\"\n  fi\n"
    },
    "profile": {
      "common": "  source \"$FLOX_ENV_CACHE/python-venv/bin/activate\"\n"
    },
    "options": {},
    "services": {
      "postgres": {
        "command": "exec postgres -D \"$PGDATA\" -p \"$DB_PORT\" -c listen_addresses='localhost'"
      },
      "redis": {
        "command": "exec redis-server --port $REDIS_PORT --bind localhost"
      }
    }
  },
