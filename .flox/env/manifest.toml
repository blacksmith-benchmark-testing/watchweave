## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
schema-version = "1.13.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"
nodejs_20.pkg-path = "nodejs_20"
python311.pkg-path = "python311"
postgresql_15.pkg-path = "postgresql_15"
redis.pkg-path = "redis"
redis.version = "7.2.7"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"
DB_HOST = "localhost"
DB_PORT = "5432"
DB_NAME = "watchweave"
DB_USER = "postgres"
DB_PASSWORD = "watchweave123"
REDIS_HOST = "localhost"
REDIS_PORT = "6379"
JWT_SECRET = "dev-jwt-secret-change-in-production"
NODE_ENV = "development"
PORT = "3000"
FLASK_DEBUG = "true"
REACT_APP_API_URL = "http://localhost:3000"
REACT_APP_RECOMMENDATION_URL = "http://localhost:5000"
PGDATA_DIR = "postgres_data"
PGUSER = "postgres"
PGPASS = "watchweave123"
PGDATABASE = "watchweave"

## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
# on-activate = '''
#   # -> Set variables, create files and directories
#   # -> Perform initialization steps, e.g. create a python venv
#   # -> Useful environment variables:
#   #      - FLOX_ENV_PROJECT=/home/user/example
#   #      - FLOX_ENV=/home/user/example/.flox/run
#   #      - FLOX_ENV_CACHE=/home/user/example/.flox/cache
# '''

on-activate = '''
  if [ ! -d "$FLOX_ENV_CACHE/python-venv" ]; then
    python3 -m venv "$FLOX_ENV_CACHE/python-venv"
  fi

  export PGDATA="$FLOX_ENV_CACHE/$PGDATA_DIR"
  if [ ! -d "$PGDATA" ]; then
    initdb "$PGDATA" --username "$PGUSER" -A md5 --pwfile=<(echo "$PGPASS") --auth=trust
    echo "completed initdb in $PGDATA"
  fi
'''

## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...
common = '''
  source "$FLOX_ENV_CACHE/python-venv/bin/activate"
'''

## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# myservice.command = "python3 -m http.server"
postgres.command = "exec postgres -D \"$PGDATA\" -p \"$DB_PORT\" -c listen_addresses='localhost'"

redis.command = "exec redis-server --port $REDIS_PORT --bind localhost"

## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


